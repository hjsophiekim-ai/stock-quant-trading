services:
  - type: web
    name: stock-quant-backend
    runtime: python
    rootDir: .
    plan: free
    autoDeploy: true
    buildCommand: pip install --upgrade pip && pip install -r requirements/backend.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: TRADING_MODE
        value: paper
      - key: LIVE_TRADING
        value: "false"
      - key: LIVE_TRADING_ENABLED
        value: "false"
      - key: LIVE_TRADING_CONFIRM
        value: "false"
      - key: LIVE_TRADING_EXTRA_CONFIRM
        value: "false"
      - key: APP_SECRET_KEY
        sync: false
      - key: KIS_APP_KEY
        sync: false
      - key: KIS_APP_SECRET
        sync: false

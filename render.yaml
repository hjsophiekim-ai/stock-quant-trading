services:
  - type: web
    name: stock-quant-backend
    runtime: python
    # Blueprint scans this file at repository root on main branch.
    rootDir: .
    plan: free
    autoDeploy: true
    # PIP_PREFER_BINARY: 소스 빌드 대신 wheel 우선(특히 pandas/numpy/cryptography)로 빌드 시간 단축
    buildCommand: python -m pip install -U pip setuptools wheel && python -m pip install -r requirements/backend.txt && python -m pip install --no-deps -e .
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PIP_PREFER_BINARY
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONPATH
        value: .
      - key: APP_ENV
        value: production
      - key: TRADING_MODE
        value: paper
      - key: LIVE_TRADING
        value: "false"
      - key: LIVE_TRADING_ENABLED
        value: "false"
      - key: LIVE_TRADING_CONFIRM
        value: "false"
      - key: LIVE_TRADING_EXTRA_CONFIRM
        value: "false"
      - key: APP_SECRET_KEY
        sync: false
      - key: KIS_APP_KEY
        sync: false
      - key: KIS_APP_SECRET
        sync: false

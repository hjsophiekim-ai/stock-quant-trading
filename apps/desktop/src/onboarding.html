<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>시작하기</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 520px;
        margin: 48px auto;
        padding: 0 20px;
        line-height: 1.5;
      }
      h1 {
        font-size: 1.5rem;
      }
      button {
        margin-top: 16px;
        padding: 10px 18px;
        font-size: 1rem;
        cursor: pointer;
      }
      .muted {
        color: #64748b;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Stock Quant에 오신 것을 환영합니다</h1>
    <p>이 앱은 <strong>백엔드 서버</strong>에 연결되어 동작합니다. 한국투자 API 키는 <strong>서버에만</strong> 저장됩니다.</p>
    <p class="muted">다음 단계: 로그인 → 대시보드 → 브로커 연결 → 모의(paper) 확인</p>
    <p class="muted">
      개발 실행(`npm start`)에서만 이 화면이 보입니다. Windows 설치본(production)은 온보딩 없이 로그인부터 시작합니다.
    </p>
    <button id="nextBtn">시작하기</button>
    <script>
      document.getElementById("nextBtn").addEventListener("click", async () => {
        if (window.appBridge) {
          await window.appBridge.onboardingMarkDone();
        }
        window.location.href = "./login.html";
      });
    </script>
  </body>
</html>

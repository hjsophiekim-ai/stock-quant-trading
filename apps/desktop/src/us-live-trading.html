<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Trading · 미국</title>
    <style>
      body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; margin: 0; background: #f8fafc; }
      .layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
      .sidebar { background: #0f172a; color: #e2e8f0; padding: 16px; }
      .sidebar button { width: 100%; margin-bottom: 8px; padding: 8px; cursor: pointer; }
      .main { padding: 16px; }
      .panel { background: #fff; border: 1px solid #cbd5e1; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
      .warn { background: #fef2f2; border-color: #fecaca; color: #7f1d1d; }
      .ok { background: #ecfdf5; border-color: #86efac; color: #166534; }
      pre { white-space: pre-wrap; font-size: 0.82rem; font-family: ui-monospace, monospace; margin: 0; }
      .muted { color: #64748b; font-size: 0.86rem; }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h3>Auto Trading</h3>
        <button id="dashboardBtn" type="button">Dashboard</button>
        <button id="domesticPaperBtn" type="button">국내 Paper</button>
        <button id="usPaperBtn" type="button">미국 Paper</button>
        <button id="domesticLiveBtn" type="button">국내 Live</button>
        <button id="usLiveBtn" type="button">미국 Live</button>
        <button id="performanceBtn" type="button">Performance</button>
        <button id="brokerSettingsBtn" type="button">Broker Settings</button>
        <button id="logoutBtn" type="button">Logout</button>
      </aside>
      <main class="main">
        <h2>미국 Live Trading · market=us</h2>
        <p class="muted">현재 백엔드의 live safety API는 시장 공통 잠금 게이트입니다. 이 화면은 US 운영용 상태판입니다.</p>
        <div id="liveWarnPanel" class="panel warn"></div>
        <div class="panel"><h3 style="margin-top: 0">상태 요약</h3><pre id="statusPre">(loading)</pre></div>
        <div class="panel"><h3 style="margin-top: 0">런타임 안전 검증</h3><pre id="runtimePre">(loading)</pre></div>
        <div class="panel"><h3 style="margin-top: 0">Paper Readiness</h3><pre id="paperReadinessPre">(loading)</pre></div>
      </main>
    </div>
    <script src="./runtime-config.js"></script>
    <script src="./auth-session.js"></script>
    <script>
      (async function () {
        const backendUrl = effectiveBackendUrl();
        const pre = await ensureValidBackendSession(backendUrl);
        if (!pre.ok) { window.location.href = "./login.html"; return; }
        async function authHeaders(extra) {
          const s = await resolveDesktopSession();
          const t = s && s.accessToken ? s.accessToken : "";
          return Object.assign({ Authorization: "Bearer " + t }, extra || {});
        }
        async function authFetch(url, options) {
          const opt = options || {};
          return fetch(url, Object.assign({}, opt, { headers: await authHeaders(opt.headers || {}) }));
        }
        async function refresh() {
          const [stR, rtR, prR, ksR] = await Promise.all([
            authFetch(backendUrl + "/api/live-trading/status"),
            authFetch(backendUrl + "/api/live-trading/runtime-safety-validation"),
            authFetch(backendUrl + "/api/live-trading/paper-readiness"),
            authFetch(backendUrl + "/api/live-trading/kill-switch-status"),
          ]);
          const st = await stR.json().catch(function () { return {}; });
          const rt = await rtR.json().catch(function () { return {}; });
          const pr = await prR.json().catch(function () { return {}; });
          const ks = await ksR.json().catch(function () { return {}; });
          document.getElementById("statusPre").textContent = JSON.stringify(st, null, 2);
          document.getElementById("runtimePre").textContent = JSON.stringify(rt, null, 2);
          document.getElementById("paperReadinessPre").textContent = JSON.stringify(pr, null, 2) + "\n\nkill_switch:\n" + JSON.stringify(ks, null, 2);
          const w = document.getElementById("liveWarnPanel");
          const can = !!st.can_place_live_order;
          w.className = "panel " + (can ? "ok" : "warn");
          w.textContent = can ? "LIVE 주문 가능 상태" : (st.warning_message || "LIVE 주문 잠금 상태");
        }
        document.getElementById("dashboardBtn").addEventListener("click", function () { window.location.href = "./dashboard.html"; });
        document.getElementById("domesticPaperBtn").addEventListener("click", function () { window.location.href = "./paper-trading.html"; });
        document.getElementById("usPaperBtn").addEventListener("click", function () { window.location.href = "./us-paper-trading.html"; });
        document.getElementById("domesticLiveBtn").addEventListener("click", function () { window.location.href = "./live-trading.html"; });
        document.getElementById("usLiveBtn").addEventListener("click", function () { window.location.href = "./us-live-trading.html"; });
        document.getElementById("performanceBtn").addEventListener("click", function () { window.location.href = "./performance.html"; });
        document.getElementById("brokerSettingsBtn").addEventListener("click", function () { window.location.href = "./broker-settings.html"; });
        document.getElementById("logoutBtn").addEventListener("click", async function () { await clearDesktopSession(); window.location.href = "./login.html"; });
        await refresh();
      })();
    </script>
  </body>
</html>

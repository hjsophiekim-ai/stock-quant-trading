<!doctype html>
<html>
  <head>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f8fafc; }
      .layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
      .sidebar { background: #0f172a; color: #e2e8f0; padding: 16px; }
      .sidebar button { width: 100%; margin-bottom: 8px; }
      .main { padding: 16px; }
      .panel { background: #fff; border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
      .warn { color: #b91c1c; font-weight: bold; }
      .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #e2e8f0; }
      .badge.live { background: #fecaca; color: #7f1d1d; }
      .badge.test { background: #dbeafe; color: #1e3a8a; }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h3>Auto Trading</h3>
        <button id="dashboardBtn">Dashboard</button>
        <button id="performanceBtn">Performance</button>
        <button id="paperTradingBtn">Paper Trading</button>
        <button id="liveSettingsBtn">Live Settings</button>
        <button id="brokerSettingsBtn">Broker Settings</button>
      </aside>
      <main class="main">
        <h2>Live Trading Safety Settings</h2>
        <p class="warn">경고: LIVE_TRADING=true 만으로는 실주문이 허용되지 않습니다.</p>
        <div class="panel">
          <p>Mode: <span id="modeText">paper</span></p>
          <p>Badge: <span id="badge" class="badge test">TEST MODE</span></p>
          <p>Can Place Live Order: <span id="canPlaceText">NO</span></p>
          <p id="warningText">잠금 상태</p>
          <p class="warn" id="lossWarnText"></p>
        </div>
        <div class="panel">
          <label><input type="checkbox" id="flag1" /> 1) Live Enable Flag</label><br />
          <label><input type="checkbox" id="flag2" /> 2) Secondary Confirmation</label><br />
          <label><input type="checkbox" id="flag3" /> 3) Extra Approval</label><br />
          <input id="reason" placeholder="변경 사유" style="width: 60%" />
          <button id="saveBtn">Save</button>
          <button id="refreshBtn">Refresh</button>
          <p id="msg"></p>
        </div>
        <div class="panel">
          <h3>설정 변경 이력</h3>
          <ul id="historyList"></ul>
        </div>
      </main>
    </div>
    <script src="./runtime-config.js"></script>
    <script>
      const backendUrl = window.RUNTIME_CONFIG?.BACKEND_URL || "http://localhost:8000";
      const msg = document.getElementById("msg");
      const badge = document.getElementById("badge");
      const historyList = document.getElementById("historyList");

      async function refreshAll() {
        const statusRes = await fetch(`${backendUrl}/api/live-trading/status`);
        const status = await statusRes.json();
        if (statusRes.ok) {
          document.getElementById("modeText").innerText = status.trading_mode;
          document.getElementById("canPlaceText").innerText = status.can_place_live_order ? "YES" : "NO";
          document.getElementById("warningText").innerText = status.warning_message;
          document.getElementById("flag1").checked = status.live_trading_flag;
          document.getElementById("flag2").checked = status.secondary_confirm_flag;
          document.getElementById("flag3").checked = status.extra_approval_flag;
          if (status.trading_badge === "live") {
            badge.className = "badge live";
            badge.innerText = "LIVE MODE";
          } else {
            badge.className = "badge test";
            badge.innerText = "TEST MODE";
          }
        }

        const killRes = await fetch(`${backendUrl}/api/live-trading/kill-switch-status`);
        const kill = await killRes.json();
        if (killRes.ok) {
          document.getElementById("lossWarnText").innerText = kill.loss_limit_exceeded
            ? `손실 제한 초과: daily=${kill.daily_loss_pct}% total=${kill.total_loss_pct}%`
            : "손실 제한 정상 범위";
        }

        const histRes = await fetch(`${backendUrl}/api/live-trading/settings-history`);
        const hist = await histRes.json();
        if (histRes.ok) {
          historyList.innerHTML = "";
          (hist.items || []).slice(0, 10).forEach((h) => {
            const li = document.createElement("li");
            li.innerText = `${h.ts} / ${h.actor} / ${h.reason}`;
            historyList.appendChild(li);
          });
        }
      }

      document.getElementById("saveBtn").addEventListener("click", async () => {
        const reason = document.getElementById("reason").value || "수동 변경";
        const payload = {
          live_trading_flag: document.getElementById("flag1").checked,
          secondary_confirm_flag: document.getElementById("flag2").checked,
          extra_approval_flag: document.getElementById("flag3").checked,
          reason,
          actor: "desktop-user",
        };
        const res = await fetch(`${backendUrl}/api/live-trading/settings`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        msg.innerText = res.ok ? "저장 완료" : data?.detail || "저장 실패";
        await refreshAll();
      });

      document.getElementById("refreshBtn").addEventListener("click", refreshAll);
      document.getElementById("dashboardBtn").addEventListener("click", () => (window.location.href = "./dashboard.html"));
      document.getElementById("performanceBtn").addEventListener("click", () => (window.location.href = "./performance.html"));
      document.getElementById("paperTradingBtn").addEventListener("click", () => (window.location.href = "./paper-trading.html"));
      document.getElementById("liveSettingsBtn").addEventListener("click", () => (window.location.href = "./live-settings.html"));
      document.getElementById("brokerSettingsBtn").addEventListener("click", () => (window.location.href = "./broker-settings.html"));
      refreshAll();
    </script>
  </body>
</html>

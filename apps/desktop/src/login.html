<!doctype html>
<html>
  <body>
    <h2>Desktop Login</h2>
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <input id="displayName" placeholder="Display Name (first run)" />
    <button id="registerBtn">Register (First Run)</button>
    <button id="loginBtn">Login</button>
    <p>첫 실행 순서: Register -> Login -> Broker Settings -> Test Connection -> Paper Trading Start</p>
    <p id="message"></p>
    <script src="./runtime-config.js"></script>
    <script>
      const backendUrl = window.RUNTIME_CONFIG?.BACKEND_URL || "http://localhost:8000";
      const msg = document.getElementById("message");
      document.getElementById("registerBtn").addEventListener("click", async () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const displayName = document.getElementById("displayName").value || (email.split("@")[0] || "new-user");
        try {
          const res = await fetch(`${backendUrl}/api/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password, display_name: displayName, role: "user" }),
          });
          const data = await res.json();
          if (!res.ok) {
            msg.innerText = data?.detail || "Register failed";
            return;
          }
          msg.innerText = "회원가입 완료. Login 버튼을 눌러 로그인하세요.";
        } catch {
          msg.innerText = "Network error";
        }
      });
      document.getElementById("loginBtn").addEventListener("click", async () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        try {
          const res = await fetch(`${backendUrl}/api/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (!res.ok) {
            msg.innerText = data?.detail || "Login failed";
            return;
          }
          localStorage.setItem("accessToken", data.access_token);
          localStorage.setItem("refreshToken", data.refresh_token);
          localStorage.setItem("email", email);
          window.location.href = "./dashboard.html";
        } catch {
          msg.innerText = "Network error";
        }
      });
    </script>
  </body>
</html>

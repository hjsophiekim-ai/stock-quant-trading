<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f8fafc;
      }
      .layout {
        display: grid;
        grid-template-columns: 220px 1fr 320px;
        min-height: 100vh;
      }
      .sidebar {
        background: #0f172a;
        color: #e2e8f0;
        padding: 16px;
      }
      .sidebar button {
        width: 100%;
        margin-bottom: 8px;
      }
      .main {
        padding: 16px;
      }
      .admin {
        border-left: 1px solid #cbd5e1;
        background: #ffffff;
        padding: 16px;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }
      .card {
        background: white;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 10px;
      }
      .risk-banner {
        background: #fff7ed;
        border: 1px solid #fdba74;
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 12px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      td,
      th {
        border-bottom: 1px solid #e2e8f0;
        padding: 6px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h3>Auto Trading</h3>
        <p id="user"></p>
        <button id="dashboardBtn">Dashboard</button>
        <button id="performanceBtn">Performance</button>
        <button id="paperTradingBtn">Paper Trading</button>
        <button id="liveSettingsBtn">Live Settings</button>
        <button id="brokerSettingsBtn">Broker Settings</button>
        <button id="logoutBtn">Logout</button>
      </aside>
      <main class="main">
        <h2>Main Dashboard</h2>
        <div class="risk-banner" id="riskBanner">Risk alert loading...</div>
        <div class="cards">
          <div class="card"><b>현재 모드</b><div id="mode"></div></div>
          <div class="card"><b>계좌 상태</b><div id="accountStatus"></div></div>
          <div class="card"><b>시스템 상태</b><div id="systemStatus"></div></div>
          <div class="card"><b>오늘 수익률</b><div id="todayReturn"></div></div>
          <div class="card"><b>월간 수익률</b><div id="monthlyReturn"></div></div>
          <div class="card"><b>누적 수익률</b><div id="cumulativeReturn"></div></div>
          <div class="card"><b>보유 포지션 수</b><div id="positionCount"></div></div>
          <div class="card"><b>실현 손익</b><div id="realizedPnl"></div></div>
          <div class="card"><b>미실현 손익</b><div id="unrealizedPnl"></div></div>
        </div>
        <h3>최근 거래 5건</h3>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Symbol</th>
              <th>Side</th>
              <th>Qty</th>
              <th>Price</th>
            </tr>
          </thead>
          <tbody id="recentTradesBody"></tbody>
        </table>
      </main>
      <aside class="admin">
        <h3>관리자 상세 패널</h3>
        <p>Runtime Control: running</p>
        <p>Risk Layer: adaptive_deleverage=ON</p>
        <p>Live Trading Lock: enabled</p>
        <p>TODO: 관리자 전용 API 연결 (권한 role=admin 필요)</p>
      </aside>
    </div>
    <script src="./runtime-config.js"></script>
    <script>
      const accessToken = localStorage.getItem("accessToken");
      const email = localStorage.getItem("email");
      const backendUrl = window.RUNTIME_CONFIG?.BACKEND_URL || "http://localhost:8000";
      const userText = document.getElementById("user");
      if (!accessToken) {
        window.location.href = "./login.html";
      } else {
        userText.innerText = `User: ${email || "-"}`;
      }
      async function loadDashboard() {
        try {
          const [summaryRes, tradesRes] = await Promise.all([
            fetch(`${backendUrl}/api/dashboard/summary`),
            fetch(`${backendUrl}/api/trading/recent-trades`),
          ]);
          const summary = await summaryRes.json();
          const trades = await tradesRes.json();
          if (!summaryRes.ok) {
            document.getElementById("riskBanner").innerText = summary?.detail || "dashboard load failed";
            return;
          }
          document.getElementById("mode").innerText = summary.mode;
          document.getElementById("accountStatus").innerText = summary.account_status;
          document.getElementById("systemStatus").innerText = summary.system_status;
          document.getElementById("todayReturn").innerText = `${summary.today_return_pct}%`;
          document.getElementById("monthlyReturn").innerText = `${summary.monthly_return_pct}%`;
          document.getElementById("cumulativeReturn").innerText = `${summary.cumulative_return_pct}%`;
          document.getElementById("positionCount").innerText = String(summary.position_count);
          document.getElementById("realizedPnl").innerText = Number(summary.realized_pnl).toLocaleString();
          document.getElementById("unrealizedPnl").innerText = Number(summary.unrealized_pnl).toLocaleString();
          document.getElementById("riskBanner").innerText = `Risk Warning: ${summary.risk_banner.message}`;
          const tbody = document.getElementById("recentTradesBody");
          tbody.innerHTML = "";
          (trades.items || []).forEach((trade) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${trade.trade_id}</td><td>${trade.symbol}</td><td>${trade.side}</td><td>${trade.quantity}</td><td>${trade.price}</td>`;
            tbody.appendChild(tr);
          });
        } catch {
          document.getElementById("riskBanner").innerText = "network error";
        }
      }
      loadDashboard();

      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("accessToken");
        localStorage.removeItem("refreshToken");
        localStorage.removeItem("email");
        window.location.href = "./login.html";
      });
      document.getElementById("brokerSettingsBtn").addEventListener("click", () => {
        window.location.href = "./broker-settings.html";
      });
      document.getElementById("paperTradingBtn").addEventListener("click", () => {
        window.location.href = "./paper-trading.html";
      });
      document.getElementById("performanceBtn").addEventListener("click", () => {
        window.location.href = "./performance.html";
      });
      document.getElementById("liveSettingsBtn").addEventListener("click", () => {
        window.location.href = "./live-settings.html";
      });
      document.getElementById("dashboardBtn").addEventListener("click", () => {
        window.location.href = "./dashboard.html";
      });
    </script>
  </body>
</html>

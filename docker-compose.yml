version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stock-quant-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      TRADING_MODE: paper
      LIVE_TRADING: "false"
      LIVE_TRADING_ENABLED: "false"
      LIVE_TRADING_CONFIRM: "false"
      LIVE_TRADING_EXTRA_CONFIRM: "false"
    restart: unless-stopped

